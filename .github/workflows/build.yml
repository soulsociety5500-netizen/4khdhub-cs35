name: Build & Deploy CloudStream Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Clone working CS3 plugin template
        run: |
          git clone --branch builds https://github.com/MustardChef/TestPlugin cs3-template || \
          git clone https://github.com/MustardChef/TestPlugin cs3-template

      - name: Copy extension into template
        run: |
          mkdir -p cs3-template/FourKHDHub/src/main/kotlin/com/lagradost
          cp src/main/kotlin/com/lagradost/*.kt cs3-template/FourKHDHub/src/main/kotlin/com/lagradost/
          cp build.gradle.kts cs3-template/FourKHDHub/build.gradle.kts
          echo "" >> cs3-template/settings.gradle
          echo 'include(":FourKHDHub")' >> cs3-template/settings.gradle
